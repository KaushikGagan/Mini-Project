<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>SecurePay — Admin</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrap">

  <header class="auth-header">
    <div class="logo-icon">🏦</div>
    <div class="brand">Secure<span>Pay</span> <span style="font-size:12px; color:var(--warn); margin-left:6px;">ADMIN</span></div>
  </header>

  <div class="auth-body">
    <div class="auth-card">
      <h2>Admin Login</h2>
      <p class="subtitle">Restricted access — authorised personnel only</p>

      {% if error %}
      <div class="alert alert-error">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="off">
        <div class="form-group">
          <label>Admin ID</label>
          <div class="input-wrap">
            <input name="username" placeholder="Enter admin ID" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input id="apass" type="password" name="password" placeholder="Enter admin password" required>
            <button type="button" class="eye-btn" onclick="togglePass('apass', this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:8px;">
          🔐 Sign In
        </button>
      </form>

      <div class="auth-footer-link" style="margin-top:20px;">
        <a href="/">← Back to user login</a>
      </div>
    </div>
  </div>

  <footer class="auth-footer">
    © 2026 SecurePay Bank &nbsp;|&nbsp; Admin Panel &nbsp;|&nbsp; Restricted Access
  </footer>
</div>
<script src="/static/script.js"></script>
</body>
</html>
